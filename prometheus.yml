# ============================================================================
# Prometheus 配置文件
# ============================================================================
#
# Prometheus 通过 HTTP 端点抓取（scrape）目标服务的指标数据。
# 本配置定义了抓取间隔和目标地址。

global:
  # scrape_interval 抓取间隔
  # 每 5 秒抓取一次，适合高频观察压测结果
  # 生产环境通常设置为 15s-30s
  scrape_interval: 5s

  # evaluation_interval 规则评估间隔
  # 告警规则评估频率
  evaluation_interval: 5s

# scrape_configs 抓取配置
# 定义要抓取的目标服务
scrape_configs:
  # ============================================================================
  # CoreRank Go 服务
  # ============================================================================
  - job_name: 'corerank-server'
    # 静态配置目标地址
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          # 添加标签便于查询过滤
          app: 'corerank'
          env: 'development'

  # ============================================================================
  # Prometheus 自监控
  # ============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
