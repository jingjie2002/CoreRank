services:
  # ============================================================================
  # Redis - 核心数据存储
  # ============================================================================
  # Redis 承担匹配池（ZSet）和排行榜（ZSet）的存储职责
  # 使用 Alpine 镜像减小体积，appendonly 保证数据持久化
  corerank-redis:
    image: redis:7.2-alpine
    container_name: corerank-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ============================================================================
  # MySQL - 可选持久化存储
  # ============================================================================
  # 默认映射到宿主机 3307，避免和用户本机已有 MySQL 3306 冲突
  corerank-mysql:
    image: mysql:8.4
    container_name: corerank-mysql
    ports:
      - "${CORERANK_MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${CORERANK_MYSQL_ROOT_PASSWORD:-corerank_root}
      MYSQL_DATABASE: ${CORERANK_MYSQL_DATABASE:-corerank}
      MYSQL_USER: ${CORERANK_MYSQL_USER:-corerank}
      MYSQL_PASSWORD: ${CORERANK_MYSQL_PASSWORD:-corerank_demo}
    command:
      - '--character-set-server=utf8mb4'
      - '--collation-server=utf8mb4_0900_ai_ci'
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ============================================================================
  # Prometheus - 监控数据采集
  # ============================================================================
  # Prometheus 定时抓取 Go 服务暴露的 /metrics 端点
  # 存储时序数据，支持 PromQL 查询
  prometheus:
    image: prom/prometheus:latest
    container_name: corerank-prometheus
    ports:
      - "9090:9090"
    volumes:
      # 挂载配置文件
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      # 持久化存储
      - ./data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    extra_hosts:
      # 允许容器访问宿主机（Windows/Mac Docker Desktop）
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ============================================================================
  # Grafana - 监控数据可视化
  # ============================================================================
  # Grafana 连接 Prometheus 数据源，提供可视化仪表盘
  # 默认账号密码：admin / admin
  grafana:
    image: grafana/grafana:latest
    container_name: corerank-grafana
    ports:
      - "3000:3000"
    volumes:
      # 持久化存储（仪表盘、数据源配置等）
      - ./data/grafana:/var/lib/grafana
      # 自动配置 Prometheus 数据源和 CoreRank dashboard
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      # 初始管理员密码
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # 允许匿名访问（仅开发环境）
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      - prometheus
    restart: unless-stopped
